services:
  - type: web
    name: susemon-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: MQTT_BROKER
        value: 53fdb682d08547bfb9177fee6bb08354.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: "8883"
      - key: MQTT_USE_TLS
        value: "true"
      - key: MQTT_TOPIC
        value: sensor/data
      - key: MQTT_CLIENT_ID
        value: susemon-fastapi
      - key: MQTT_USER
        value: susemon
      - key: MQTT_PASS
        value: Susemon2026mqtt
      - key: AI_THRESHOLD_TEMP
        value: "40"
      - key: AI_THRESHOLD_TEMP_WARNING
        value: "35"
      - key: AI_THRESHOLD_HUMIDITY
        value: "85"
      - key: AI_THRESHOLD_HUM_WARNING
        value: "80"
      - key: GATEWAY_API_KEY
        value: gw-susemon-2026-pbl412
      # Isi manual di Render dashboard:
      - key: JWT_SECRET
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: susemon_db

databases:
  - name: susemon-db
    databaseName: susemon_db
    user: susemon
